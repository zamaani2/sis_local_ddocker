<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}School Management System{% endblock %}</title>

    <!-- Bootstrap CSS (local) -->
    {% load static %}
    <link

      href="{% static 'vendor/bootstrap/5.3.0/css/bootstrap.min.css' %}"

      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="{% static 'vendor/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css' %}"
    />

    <style>
      @media print {
        .print-button {
          display: none !important;
        }

        body {
          padding: 0;
          margin: 0;
        }

        .container {
          width: 100%;
          max-width: 100%;
          padding: 0;
          margin: 0;
        }

        /* Ensure tables print well */
        table {
          width: 100%;
          border-collapse: collapse;
        }

        /* Add page breaks where needed */
        .page-break {
          page-break-after: always;
        }

        /* Print background colors and images */
        * {
          -webkit-print-color-adjust: exact !important;
          color-adjust: exact !important;
        }
      }

      /* General styling */
      body {
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.6;
      }

      .school-header {
        text-align: center;
        margin-bottom: 20px;
      }

      .school-logo {
        max-height: 80px;
        margin-bottom: 10px;
      }

      .school-name {
        font-size: 1.5rem;
        font-weight: bold;
        margin-bottom: 5px;
      }

      .school-address {
        font-size: 0.9rem;
        margin-bottom: 5px;
      }

      .document-title {
        font-size: 1.2rem;
        font-weight: bold;
        text-align: center;
        margin: 15px 0;
        text-transform: uppercase;
      }
    </style>

    {% block extra_css %}{% endblock %}
  </head>
  <body>
    {% block school_header %}
    <!-- This block can be overridden to include school header with logo -->
    {% endblock %} {% block content %}
    <!-- Main content goes here -->
    {% endblock %}

    <!-- Bootstrap JS (optional, local) -->

    <script src="{% static 'vendor/bootstrap/5.3.0/js/bootstrap.bundle.min.js' %}"></script>


    {% block extra_js %}{% endblock %}
  </body>
</html>
