{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset - SchoolApp</title>

    <!-- Include the centralized styles -->
    {% include 'partials/_styles.html' %}

    <style>
      .password-reset-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .password-reset-card {
        border-radius: var(--border-radius-md);
        box-shadow: var(--box-shadow-md);
        border: 1px solid rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 100%;
      }

      .password-reset-header {
        background-color: var(--primary-color);
        color: white;
        padding: var(--spacing-lg);
        border-top-left-radius: var(--border-radius-md);
        border-top-right-radius: var(--border-radius-md);
        text-align: center;
      }

      .password-reset-body {
        padding: var(--spacing-lg);
      }

      .btn-submit {
        background-color: var(--primary-color);
        border-color: var(--primary-dark);
        width: 100%;
        padding: 10px;
        font-weight: 500;
        margin-bottom: 15px;
        transition: all 0.3s ease;
      }

      .btn-submit:hover {
        background-color: var(--primary-dark);
        transform: translateY(-2px);
      }

      .back-to-login {
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }

      .back-to-login:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="password-reset-container">
      <div class="password-reset-card">
        <div class="password-reset-header">
          <h2 class="mb-0">Password Reset</h2>
        </div>
        <div class="password-reset-body">
          <p class="lead mb-4">
            Forgot your password? Enter your email address below, and we'll
            email instructions for setting a new one.
          </p>

          {% if form.errors %}
          <div class="alert alert-danger">{{ form.errors }}</div>
          {% endif %}

          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label for="id_email" class="form-label">Email address</label>
              <input
                type="email"
                name="email"
                id="id_email"
                class="form-control"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary btn-submit">
              Send Password Reset Link
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="back-to-login">Back to Login</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
