<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - SchoolApp</title>
    {% load static %}
    <link

      href="{% static 'vendor/bootstrap/5.3.0/css/bootstrap.min.css' %}"

      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-4">
          <div class="card shadow">
            <div class="card-body p-4">
              <h2 class="text-center mb-4">Reset Password</h2>
              <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                  <label for="new_password1" class="form-label"
                    >New Password</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="new_password1"
                    name="new_password1"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="new_password2" class="form-label"
                    >Confirm Password</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="new_password2"
                    name="new_password2"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Reset Password
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="{% static 'vendor/bootstrap/5.3.0/js/bootstrap.bundle.min.js' %}"></script>

  </body>
</html>
