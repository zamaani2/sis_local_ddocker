<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Theme Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/green_theme.css">
    <style>
        body { padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Green Theme Test</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title">Test Card</h5>
                    </div>
                    <div class="card-body">
                        <p>This is a test card to verify the green theme is working.</p>
                        <button class="btn btn-primary">Primary Button</button>
                        <button class="btn btn-success">Success Button</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Test Item</td>
                            <td><span class="badge bg-primary">Active</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="mt-4">
            <h3>Theme Toggle Test</h3>
            <button class="btn btn-outline-primary" onclick="toggleTheme()">Toggle Green Theme</button>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('green-theme-page')) {
                body.classList.remove('green-theme-page');
                console.log('Green theme removed');
            } else {
                body.classList.add('green-theme-page');
                console.log('Green theme applied');
            }
        }
        
        // Apply green theme by default for testing
        document.body.classList.add('green-theme-page');
    </script>
</body>
</html>
