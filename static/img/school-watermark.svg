<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="watermarkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#003366;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="white" />
  
  <!-- Main Text -->
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="url(#watermarkGradient)" transform="rotate(-20, 400, 200)">CISSEY-TECH</text>
  
  <!-- Shadow Text (for depth) -->
  <text x="403" y="203" font-family="Arial, sans-serif" font-size="60" font-weight="bold" text-anchor="middle" fill="rgba(0,0,0,0.1)" transform="rotate(-20, 400, 200)">CISSEY-TECH</text>
  
  <!-- Subtle circular background -->
  <circle cx="400" cy="200" r="180" fill="none" stroke="rgba(0,102,204,0.1)" stroke-width="5" />
</svg>